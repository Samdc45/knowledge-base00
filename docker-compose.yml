services:
  south-lms:
    image: mass161/south-lms:latest
    container_name: south-lms
    ports:
      - "6000:6000"
    environment:
      - PORT=6000
      - FLASK_ENV=production
    networks:
      - chat-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  chat-network:
    driver: bridge
    name: chat-network
